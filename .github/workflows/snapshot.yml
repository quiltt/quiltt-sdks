name: Snapshot Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag for the snapshot (e.g. next, canary, pr-123)"
        required: false
        default: "next"
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions: {}

jobs:
  snapshot:
    # prevent this action from running on forks
    if: github.repository == 'quiltt/quiltt-sdks'

    name: Publish snapshot
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-js
        with:
          build-packages: "false"

      - name: Create .npmrc in home folder
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> $HOME/.npmrc
          echo "strict-peer-dependencies=false" >> $HOME/.npmrc
          echo "git-checks=false" >> $HOME/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check for changesets
        run: |
          count=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')
          if [ "$count" -eq 0 ]; then
            echo "No changesets found. Create one first: pnpm changeset"
            exit 1
          fi
          echo "Found $count changeset(s)"

      - name: Validate snapshot tag
        id: validate_tag
        env:
          SNAPSHOT_TAG_INPUT: ${{ inputs.tag }}
        run: |
          if [[ ! "$SNAPSHOT_TAG_INPUT" =~ ^[a-z0-9][a-z0-9._-]{0,127}$ ]]; then
            echo "Invalid snapshot tag: $SNAPSHOT_TAG_INPUT"
            echo "Snapshot tags must match ^[a-z0-9][a-z0-9._-]{0,127}$"
            exit 1
          fi

          echo "tag=$SNAPSHOT_TAG_INPUT" >> "$GITHUB_OUTPUT"

      - name: Version packages as snapshot
        env:
          SNAPSHOT_TAG: ${{ steps.validate_tag.outputs.tag }}
        run: pnpm changeset version --snapshot "$SNAPSHOT_TAG"

      - name: Build packages
        run: pnpm build:packages

      - name: Publish snapshot to npm
        run: pnpm -r publish --tag "$SNAPSHOT_TAG" --no-git-checks --filter=./packages/**
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          SNAPSHOT_TAG: ${{ steps.validate_tag.outputs.tag }}

      - name: Write step summary
        uses: actions/github-script@v7
        env:
          SNAPSHOT_TAG: ${{ steps.validate_tag.outputs.tag }}
        with:
          script: |
            const fs = require('fs')
            const version = JSON.parse(fs.readFileSync('packages/core/package.json', 'utf8')).version
            const tag = process.env.SNAPSHOT_TAG

            await core.summary
              .addHeading('Snapshot published', 2)
              .addRaw(`**Version:** \`${version}\`\n\n**Tag:** \`${tag}\`\n\nInstall:`)
              .addCodeBlock(
                `pnpm add @quiltt/core@${tag}\npnpm add @quiltt/react@${tag}`,
                'sh'
              )
              .write()
