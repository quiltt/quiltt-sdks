name: Integration Tests - Vue

on:
  push:
    branches:
      - main
    paths:
      - 'examples/vue-nuxt/**'
      - 'packages/vue/**'
      - 'packages/core/**'
  pull_request:
    paths:
      - 'examples/vue-nuxt/**'
      - 'packages/vue/**'
      - 'packages/core/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  checks: write
  statuses: write
  actions: write

jobs:
  test-vue-nuxt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-js

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./examples/vue-nuxt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm run playwright:install
        working-directory: ./examples/vue-nuxt

      - name: Build app
        run: pnpm run build
        working-directory: ./examples/vue-nuxt
        env:
          NUXT_PUBLIC_QUILTT_CLIENT_ID: ${{ secrets.QUILTT_CLIENT_ID }}
          NUXT_PUBLIC_CONNECTOR_ID: ${{ secrets.QUILTT_CONNECTOR_ID }}

      - name: Run E2E tests
        run: pnpm run test
        working-directory: ./examples/vue-nuxt
        env:
          NUXT_PUBLIC_QUILTT_CLIENT_ID: ${{ secrets.QUILTT_CLIENT_ID }}
          NUXT_PUBLIC_CONNECTOR_ID: ${{ secrets.QUILTT_CONNECTOR_ID }}

      - if: failure()
        name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuxt_test_artifacts_${{ github.sha }}
          path: ./examples/vue-nuxt/playwright-report
